# =============================================================================
# Decontamination — scrub the prompt pool against our downstream eval benchmarks.
#
# Runs between Stage 2 and Stage 3. Removes any collected/generated prompt that
# shares a 13-word span (or, for short eval items, exactly contains one) with any
# eval below, and writes a CLEAN pool to {base_path}/stage_decontam/clean/ that
# Stage 3 reads automatically.
#
# Usage (standalone against an existing run):
#   sft-pipeline run-stage decontaminate --config config/decontaminate.yaml
#
# Every repo/config/split/field below was verified against the HF dataset on
# 2026-07-16. Notes on the non-obvious ones:
#   - Many eval sets ship their eval data under the `train` split on HF
#     (AIME 24/25/26, GPQA, MT-Bench, IFEval, IFBench, XSTest) — splits are set
#     per-eval accordingly, NOT the [test, validation] default.
#   - hle (cais/hle) is GATED: needs HF_TOKEN + accepted terms in the run env.
#   - livecodebench_v6 uses a Parquet CLONE — the official
#     livecodebench/code_generation_lite is a script dataset that datasets>=4
#     refuses to load.
#   - harmbench uses the ungated mariagrandury mirror (walledai/HarmBench is gated).
#   - Dropped from the requested list: OneRuler (no static HF dataset — generated
#     synthetically) and BFCL v3 (not load_dataset-compatible; function-calling
#     format is a poor fit for prompt n-gram decontamination).
# =============================================================================

global:
  device: "cpu"           # decontamination is pure CPU
  run_id: "research_stage3_001"
  base_path: "/shared_silo/scratch/rahul.aralikatte@amd.com/sft-pipeline/runs/{run_id}"
  checkpoint_db: "{base_path}/checkpoints.duckdb"
  # ray_address: "auto"   # uncomment + set distributed: true for a multi-node run

decontaminate:
  enabled: true
  ngram_size: 13
  min_gram_size: 5
  # Flip to true (with global.ray_address) to fan the per-shard scan across a
  # Ray cluster for the full 14.8M-prompt pool. false → this node only.
  distributed: false
  n_workers: null           # null → os.cpu_count(); ignored when distributed
  output_dir: "{base_path}/stage_decontam/clean"
  report_path: "{base_path}/stage_decontam/decontam_report.json"
  removed_dir: "{base_path}/stage_decontam/removed"

  evals:
    # ── Instruction following ────────────────────────────────────────────
    - name: mtbench
      source: hf_dataset
      hf_repo_id: HuggingFaceH4/mt_bench_prompts
      splits: [train]
      match_fields: [prompt]              # list of turns → space-joined

    - name: ifeval
      source: hf_dataset
      hf_repo_id: google/IFEval
      splits: [train]
      match_fields: [prompt]

    - name: ifbench
      source: hf_dataset
      hf_repo_id: allenai/IFBench_test
      splits: [train]
      match_fields: [prompt]

    - name: multi_if
      source: hf_dataset
      hf_repo_id: facebook/Multi-IF     # multilingual (CJK/Thai match degrades)
      splits: [train]
      match_fields: [turn_1_prompt, turn_2_prompt, turn_3_prompt]

    # ── Knowledge / reasoning QA ─────────────────────────────────────────
    - name: gpqa_diamond
      source: hf_dataset
      hf_repo_id: Idavidrein/gpqa
      hf_configs: [gpqa_diamond]
      splits: [train]
      match_fields: [Question]

    - name: hle                          # GATED — needs HF_TOKEN + accepted terms
      source: hf_dataset
      hf_repo_id: cais/hle
      splits: [test]
      match_fields: [question]

    - name: bbh
      source: hf_dataset
      hf_repo_id: lukaemon/bbh
      hf_configs: all                    # 27 subjects
      splits: [test]
      match_fields: [input]

    - name: arc_challenge
      source: hf_dataset
      hf_repo_id: allenai/ai2_arc
      hf_configs: [ARC-Challenge]
      splits: [test, validation]
      match_fields: [question, choices.text]   # choices is {text:[...], label:[...]}

    - name: mmlu
      source: hf_dataset
      hf_repo_id: cais/mmlu
      hf_configs: [all]                  # combined-subjects config (not the "all" expansion)
      splits: [test, validation]
      match_fields: [question, choices]

    - name: truthfulqa_mc2
      source: hf_dataset
      hf_repo_id: truthfulqa/truthful_qa
      hf_configs: [multiple_choice]
      splits: [validation]
      match_fields: [question]

    - name: goldenswag
      source: hf_dataset
      hf_repo_id: PleIAs/GoldenSwag      # filtered HellaSwag validation subset
      splits: [validation]
      match_fields: [ctx]

    # ── Math ─────────────────────────────────────────────────────────────
    - name: math_500
      source: hf_dataset
      hf_repo_id: HuggingFaceH4/MATH-500
      splits: [test]
      match_fields: [problem]

    - name: aime_2024
      source: hf_dataset
      hf_repo_id: Maxwell-Jia/AIME_2024
      splits: [train]
      match_fields: [Problem]           # note: capital P in this repo

    - name: aime_2025
      source: hf_dataset
      hf_repo_id: yentinglin/aime_2025
      splits: [train]
      match_fields: [problem]

    - name: aime_2026
      source: hf_dataset
      hf_repo_id: MathArena/aime_2026
      splits: [train]
      match_fields: [problem]

    - name: gsm8k
      source: hf_dataset
      hf_repo_id: openai/gsm8k
      hf_configs: [main]
      splits: [test]
      match_fields: [question]

    # ── Code ─────────────────────────────────────────────────────────────
    - name: mbpp
      source: hf_dataset
      hf_repo_id: google-research-datasets/mbpp
      hf_configs: [full]
      splits: [test]                     # eval split only, per request
      match_fields: [text]

    - name: humaneval
      source: hf_dataset
      hf_repo_id: openai/openai_humaneval
      hf_configs: [openai_humaneval]
      splits: [test]
      match_fields: [prompt]

    - name: livecodebench_v6
      source: hf_dataset
      hf_repo_id: sam-paech/livecodebench-code_generation_lite  # Parquet clone
      splits: [release_v6]
      match_fields: [question_content]

    # ── Safety ───────────────────────────────────────────────────────────
    - name: harmbench
      source: hf_dataset
      hf_repo_id: mariagrandury/harmbench   # ungated mirror
      hf_configs: [DirectRequest]
      splits: [val, test]
      match_fields: [Behavior]

    - name: xstest
      source: hf_dataset
      hf_repo_id: Paul/XSTest
      splits: [train]
      match_fields: [prompt]
