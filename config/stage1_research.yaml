# SFT Pipeline — Stage 1 Only: Research Dataset Collection
#
# Collects prompts from 45 public HF datasets covering math, code, science,
# and general instruction-following. Stages 2–6 are all disabled.
#
# Each source is capped at max_examples=10 for fast iteration.
# Remove or increase max_examples for a full production collection run.
#
# Notes:
#   - lmsys/lmsys-chat-1m requires accepting the dataset licence on HF.
#     Set HF_TOKEN env var before running if you haven't accepted it yet.
#   - Fields using dot notation (e.g. "responses_create_params.input") extract
#     a nested sub-field two levels deep from each row.
#
# Usage:
#   sft-pipeline run-stage stage1_collect --config config/stage1_research.yaml

global:
  run_id: "research_stage1_001d"
  base_path: "/scratch/project_462000963/users/aralikatte/sft-pipeline/runs/{run_id}"
  log_level: "INFO"
  device: "cuda"
  # Set to a path with plenty of disk space before downloading large datasets.
  hf_home: "/scratch/project_462000963/hf_cache"

stage1_collect:
  distributed: true
  output_path: "{base_path}/stage1/prompts.jsonl"

  datasets:

    # ── NVIDIA Nemotron / Ace / Open* ──────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-SWE-v1
      hf_split: r2e_gym
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/OpenMathInstruct-2
      hf_split: train_5M
      prompt_field: problem
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: nvidia/OpenCodeInstruct
      hf_split: train
      prompt_field: input
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/AceReason-Math
      hf_split: train
      prompt_field: problem
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: nvidia/AceReason-1.1-SFT
      hf_split: train
      prompt_field: input
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Science-v1
      hf_split: MCQ
      prompt_field: messages
      domain_hint: science

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Science-v1
      hf_split: RQA
      prompt_field: messages
      domain_hint: science

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Instruction-Following-Chat-v1
      hf_split: chat_if
      prompt_field: messages
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Instruction-Following-Chat-v1
      hf_split: structured_outputs
      prompt_field: messages
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Math-Proofs-v1
      hf_split: lean
      prompt_field: problem
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Agentic-v1
      hf_split: interactive_agent
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Competitive-Programming-v1
      hf_split: competitive_coding_cpp_part00
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Competitive-Programming-v1
      hf_split: competitive_coding_cpp_part01
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Competitive-Programming-v1
      hf_split: competitive_coding_python_part00
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Competitive-Programming-v1
      hf_split: competitive_coding_python_part01
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Competitive-Programming-v1
      hf_split: infinibyte_part00
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Competitive-Programming-v1
      hf_split: infinibyte_part01
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-Math-v2
      hf_split: high_part00
      prompt_field: problem
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-SFT-SWE-v2
      hf_split: agentless
      prompt_field: messages
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-SFT-Safety-v1
      hf_split: train
      prompt_field: messages
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: nvidia/Nemotron-SFT-Instruction-Following-Chat-v2
      hf_split: reasoning_on
      prompt_field: messages
      domain_hint: general

    # ── Allen AI ────────────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: allenai/tulu-3-sft-mixture
      hf_split: train
      prompt_field: messages
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: allenai/WildChat-4.8M
      hf_split: train
      prompt_field: conversation
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: allenai/coconot
      hf_config: original
      hf_split: train
      prompt_field: prompt
      domain_hint: general

    # ── Microsoft ───────────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: microsoft/orca-math-word-problems-200k
      hf_split: train
      prompt_field: question
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: microsoft/rStar-Coder
      hf_config: seed_sft
      hf_split: train
      prompt_field: question
      domain_hint: code

    # ── HuggingFace ─────────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: HuggingFaceTB/smoltalk
      hf_config: all
      hf_split: train
      prompt_field: messages
      domain_hint: general

    # ── PrimeIntellect SYNTHETIC ─────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: PrimeIntellect/SYNTHETIC-1-SFT-Data
      hf_split: train
      prompt_field: messages
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: PrimeIntellect/SYNTHETIC-2-SFT-verified
      hf_split: train
      prompt_field: messages
      domain_hint: general

    # ── Argilla / Magpie ─────────────────────────────────────────────────────
    # conversation field: list of {"role": ..., "content": ...} (OpenAI format).

    - source: hf_dataset
      hf_repo_id: argilla/magpie-ultra-v1.0
      hf_split: train
      prompt_field: conversation
      domain_hint: general

    # ── Math / Reasoning ────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: AI-MO/NuminaMath-CoT
      hf_split: train
      prompt_field: problem
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: open-thoughts/OpenThoughts3-1.2M
      hf_split: train
      prompt_field: conversations
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: open-thoughts/OpenThoughts-114k
      hf_config: default
      hf_split: train
      prompt_field: conversations
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: open-r1/OpenR1-Math-220k
      hf_config: all
      hf_split: train
      prompt_field: problem
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: alibaba-pai/OmniThought-0528
      hf_split: train
      prompt_field: question
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: meta-math/MetaMathQA
      hf_split: train
      prompt_field: query
      domain_hint: math

    - source: hf_dataset
      hf_repo_id: bespokelabs/Bespoke-Stratos-17k
      hf_split: train
      prompt_field: conversations
      domain_hint: math

    # ── Code ────────────────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: m-a-p/CodeFeedback-Filtered-Instruction
      hf_split: train
      prompt_field: query
      domain_hint: code

    # conversations field: ShareGPT format ({"from": ..., "value": ...}).
    - source: hf_dataset
      hf_repo_id: Salesforce/APIGen-MT-5k
      hf_split: train
      prompt_field: conversations
      domain_hint: code

    # ── Chat ────────────────────────────────────────────────────────────────
    # Requires accepting the dataset licence on HF (set HF_TOKEN env var).

    - source: hf_dataset
      hf_repo_id: lmsys/lmsys-chat-1m
      hf_split: train
      prompt_field: conversation
      domain_hint: general

    # ── OPC SFT Stage 2 ─────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: OpenCoder-LLM/opc-sft-stage2
      hf_config: educational_instruct
      hf_split: train
      prompt_field: instruction
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: OpenCoder-LLM/opc-sft-stage2
      hf_config: evol_instruct
      hf_split: train
      prompt_field: instruction
      domain_hint: general

    - source: hf_dataset
      hf_repo_id: OpenCoder-LLM/opc-sft-stage2
      hf_config: mceval_instruct
      hf_split: train
      prompt_field: instruction
      domain_hint: code

    - source: hf_dataset
      hf_repo_id: OpenCoder-LLM/opc-sft-stage2
      hf_config: package_instruct
      hf_split: train
      prompt_field: instruction
      domain_hint: code

    # ── Miscellaneous ────────────────────────────────────────────────────────

    - source: hf_dataset
      hf_repo_id: mlabonne/open-perfectblend
      hf_split: train
      prompt_field: conversations
      domain_hint: general

# ── All other stages disabled ─────────────────────────────────────────────────

stage2_generate:
  enabled: false

stage3_cluster:
  enabled: false

stage4_sample:
  enabled: false

stage5_inference:
  enabled: false

stage6_filter:
  enabled: false
