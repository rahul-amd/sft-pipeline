# =============================================================================
# Stage 3 Cluster Run — Distributed embedding + torch_kmeans clustering
#
# Usage:
#   sbatch scripts/slurm_stage3.sh                          # uses this config
#   sbatch scripts/slurm_stage3.sh config/stage3_cluster.yaml  # explicit
#
# What this run does:
#   - Reads Stage 1 output from the research_stage1_001d run
#   - Embeds all prompts in parallel across 32 Ray workers (4 nodes × 8 GPUs each)
#   - Builds a FAISS IVFFlat index on the head node
#   - Clusters 5M embeddings into 100,000 clusters with torch_kmeans (GPU)
#   - Writes enriched JSONL with domain, difficulty, cluster_id
#
# Prerequisites:
#   - Stage 1 complete: runs/research_stage1_001d/stage1/ must exist
#   - flash-kmeans installed: bash scripts/install_flash_kmeans.sh
#   - stage1_collect.distributed must be false here (Stage 1 already done)
# =============================================================================

global:
  device: "rocm"
  ray_address: "auto"
  run_id: "research_stage3_001"
  base_path: "/scratch/project_462000963/users/aralikatte/sft-pipeline/runs/{run_id}"
  hf_home: "/scratch/project_462000963/hf_cache"
  seed: 42

# ---------------------------------------------------------------------------
# Stage 1 — disabled; output_dir points to the shard directory that Stage 3
# will glob for part-*.jsonl files.  Set this to the Stage 1 run's stage1/
# directory (e.g. "{base_path}/stage1" from the previous run).
# ---------------------------------------------------------------------------
stage1_collect:
  enabled: false
  distributed: false
  datasets: []
  # Stage 3 reads output_dir → looks for part-*.jsonl there.
  # This matches the research_stage1_001d run (stage1_research.yaml).
  output_dir: "/scratch/project_462000963/users/aralikatte/sft-pipeline/runs/research_stage1_001d/stage1"

# ---------------------------------------------------------------------------
# Stage 2 — disabled; output_dir is used to locate Stage 2 shard directory
# ---------------------------------------------------------------------------
stage2_generate:
  enabled: false
  output_dir: "{base_path}/stage2"

# ---------------------------------------------------------------------------
# Stage 3 — distributed embedding + torch_kmeans with 100k clusters
# ---------------------------------------------------------------------------
stage3_cluster:
  enabled: true
  distributed: true
  n_embedding_workers: 32           # 4 nodes × 8 GPUs each = 32 parallel workers
  embedding_model: "BAAI/bge-m3"
  # embedding_batch_size is the GPU forward-pass cap passed as gpu_batch_size to
  # model.encode().  I/O accumulation uses batch_size=500 (independent).
  # Eager attention at max_seq_length=512: 32×16×512²×4 B = 512 MB — safe.
  embedding_batch_size: 32
  # FAISS index (built on head node after embedding completes)
  faiss_index_type: "IVFFlat"
  faiss_nlist: 2000                 # more centroids → finer ANN search
  faiss_nprobe: 100
  faiss_training_sample: 4000000   # FAISS recommends ≥39×k; 39×100k=3.9M
  # Clustering: torch_kmeans uses PyTorch matmuls (cosine distance) directly on
  # GPU — no Triton, no faiss-gpu, works natively on MI250X/ROCm.
  # flash_kmeans (Triton) requires 128 KB shared memory; MI250X limit is 64 KB.
  # faiss_kmeans falls back to CPU BLAS and takes ~8 hours for 15M × 100K.
  clustering_algorithm: "torch_kmeans"
  n_clusters: 100000                # fine-grained topic clusters (~50 pts/cluster)
  # Difficulty heuristics (unchanged from default)
  difficulty_easy_max_tokens: 50
  difficulty_hard_min_tokens: 200
  # ---------------------------------------------------------------------------
  # LLM annotation — set annotation_enabled: true and point annotation_api_base
  # at a running vLLM OpenAI-compatible server before enabling.
  #
  # Start the server on the head node before running the Slurm job:
  #   singularity exec ... scripts/run_in_env.sh \
  #       python -m vllm.entrypoints.openai.api_server \
  #           --model Qwen/Qwen3-30B-A3B-Thinking-2507 \
  #           --tensor-parallel-size 4 \
  #           --port 8001
  #
  # annotation_concurrency controls how many API requests are in flight at once.
  # Tune it to match the server's throughput (start at 64, increase if GPU util is low).
  # ---------------------------------------------------------------------------
  annotation_enabled: true
  annotation_model: "Qwen/Qwen3-30B-A3B-Thinking-2507"
  annotation_api_base: "http://nid005361:8000/v1"
  annotation_api_key: "none"
  annotation_concurrency: 64
  annotation_max_tokens: 1024
  annotation_temperature: 0.2
  annotation_checkpoint_every: 50000
  # Output paths
  embeddings_dir: "{base_path}/stage3/embeddings"
  faiss_index_path: "{base_path}/stage3/faiss.index"
  output_dir: "{base_path}/stage3"

# ---------------------------------------------------------------------------
# Stages 4–6 — disabled in this run
# ---------------------------------------------------------------------------
stage4_sample:
  enabled: false

stage5_inference:
  enabled: false

stage6_filter:
  enabled: false
