# =============================================================================
# Stage 6 Quality Filtering — v2 rerun with the recalibrated verifiers
#
# Usage:
#   sft-pipeline run-stage stage6_filter --config config/stage6_filter_v2.yaml
#
# What this run does:
#   - Reads raw Stage 5 responses from {base_path}/stage5/part-*.jsonl
#   - Parses each response into reasoning/answer using the delimiters the
#     teacher ACTUALLY emitted (<|channel>thought ... <channel|> ...), not the
#     <think>/<answer> tags it was prompted for
#   - Runs the recalibrated filter chain (see sanity-checks/ for the
#     LLM-judge evaluation behind every threshold)
#   - Writes filtered output to {base_path}/stage6_v2/ (v1 output untouched)
#
# Prerequisites:
#   - Stage 5 complete: {base_path}/stage5/ must exist
#   - Set global.run_id to the run that contains the stage5/ output
#
# Notes:
#   - Uses a dedicated checkpoint DB so a previous stage6 (v1) run can never
#     mark records as already-processed and silently skip them.
#   - The LLM judge is disabled here to keep the rerun deterministic and
#     dependency-free; enable it and point model_endpoint at a running vLLM
#     server to add sampled judge filtering on top.
# =============================================================================

global:
  device: "cpu"          # filtering needs no GPU (code runs in subprocesses)
  run_id: "research_stage3_001"
  base_path: "/shared_silo/scratch/rahul.aralikatte@amd.com/sft-pipeline/runs/{run_id}"
  checkpoint_db: "{base_path}/checkpoints_stage6_v2.duckdb"

# The Stage 5 dataset's real reasoning delimiters (verified on 2000 records:
# every response is "<|channel>thought ... <channel|> ...final answer...").
stage5_inference:
  output_dir: "{base_path}/stage5"
  delimiters:
    think_start: "<|channel>thought"
    think_end: "<channel|>"

stage6_filter:
  enabled: true
  parse_responses: true
  # Fan the filter chain across processes. null → os.cpu_count(). The loop is
  # CPU/subprocess-bound (code sandbox dominates), so this scales ~linearly.
  n_workers: null
  worker_chunk_size: 32
  structural:
    min_response_tokens: 20
    max_response_tokens: 8000
    max_repetition_ngram: 5
    max_repetition_count: 40   # length-aware floor; stuck loops repeat ~95x
  heuristic:
    min_info_density: 0.20
    flag_self_contradiction: false   # measured ~4% precision — noise
  math:
    enabled: true
    domains: ["math", "science"]
  code:
    enabled: true
    sandbox: "subprocess"   # change to "e2b" for stronger isolation
    # A hanging/looping snippet blocks its worker for the full timeout. 3s is
    # plenty for a self-contained verification snippet; raise only if legitimate
    # code is being rejected with code_timeout in the filter report.
    timeout_seconds: 3
    domains: ["code"]
  llm_judge:
    enabled: false          # enable + set endpoint to add sampled judging
    model_endpoint: "http://localhost:8001/v1"
    model: "Qwen/Qwen2.5-7B-Instruct"
    score_threshold: 6.0
    sample_rate: 0.10
  output_dir: "{base_path}/stage6_v2"
  report_path: "{base_path}/stage6_v2/filter_report.json"
  debug_rejection_path: "{base_path}/stage6_v2/debug_rejections.jsonl"
